<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="main.css">
    <script src="main.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1>My Library</h1>
    </header>
    <main>
        <div class="library-display">
            <div class="book-card">
                <div class="title">

                </div>
                <div class="author">

                </div>
                <div class="pages">

                </div>

                <button class="remove-button">Remove Book</button>
                <button class="read-button">Read</button>
            </div>
        </div>

        <div class="add-wrapper">
        <button class="add-button">Add Book</button>
        </div>

        <dialog id="add-book">
            <form method="dialog">
                <label>Title:</label>
                <input type="text" name="title" id="title" required>
                <label>Author:</label>
                <input type="text" name="author" id="author" required>
                <label>Number of Pages:</label>
                <input type="number" name="page-number" id="page-number" required>
                <fieldset>
                    <legend>Have you read this book?</legend>
                    <label><input type="checkbox" name="yes" value="true">Yes</label>
                    <label><input type="checkbox" name="no" value="false">No</label>
                </fieldset>
                <button type="submit">Submit</button>
            </form>
        </dialog>

    </main>
</body>

</html>
